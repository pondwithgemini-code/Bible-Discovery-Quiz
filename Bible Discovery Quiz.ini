  { id: 'starter', title: 'ผู้เริ่มต้น', desc: 'ทำแบบทดสอบจบ 1 เล่ม', icon: <Star />, color: 'text-blue-500', bg: 'bg-blue-50' },
  { id: 'scholar', title: 'นักวิชาการ', desc: 'ทำคะแนนเต็ม 10 ในเล่มใดก็ได้', icon: <GraduationCap />, color: 'text-purple-500', bg: 'bg-purple-50' },
  { id: 'warrior', title: 'นักรบพระคำ', desc: 'สะสมแต้มรวมครบ 50 แต้ม', icon: <ShieldCheck />, color: 'text-red-500', bg: 'bg-red-50' },
  { id: 'fast', title: 'ไวปานสายฟ้า', desc: 'ตอบถูก 3 ข้อติดต่อกัน', icon: <Zap />, color: 'text-amber-500', bg: 'bg-amber-50' },
  { id: 'seeker', title: 'ผู้แสวงหา', desc: 'จบแบบทดสอบ 5 เล่ม', icon: <Flame />, color: 'text-orange-500', bg: 'bg-orange-50' },
  { id: 'centurion', title: 'สาวกตัวจริง', desc: 'สะสมแต้มรวมครบ 100 แต้ม', icon: <Crown />, color: 'text-indigo-600', bg: 'bg-indigo-50' },
  { id: 'high_priest', title: 'ศิษยาภิบาลผู้รอบรู้', desc: 'สะสมแต้มรวมครบ 150 แต้ม', icon: <Gem />, color: 'text-violet-600', bg: 'bg-violet-50' },
  { id: 'master', title: 'ปรมาจารย์พันธสัญญาใหม่', desc: 'จบครบทุกเล่ม', icon: <Trophy />, color: 'text-yellow-600', bg: 'bg-yellow-50' },
  // Specific Book Awards (Unlocked on Perfect 10)
  { id: 'matthew_max', title: 'กษัตริย์ผู้มาบังเกิด', desc: 'คะแนนเต็มในมัทธิว', icon: <Crown />, color: 'text-yellow-500', bg: 'bg-yellow-50' },
  { id: 'mark_max', title: 'ผู้รับใช้ที่เร่งรีบ', desc: 'คะแนนเต็มในมาระโก', icon: <Zap />, color: 'text-emerald-500', bg: 'bg-emerald-50' },
  { id: 'luke_max', title: 'แพทย์ผู้เมตตา', desc: 'คะแนนเต็มในลูกา', icon: <Heart />, color: 'text-rose-500', bg: 'bg-rose-50' },
  { id: 'john_max', title: 'สาวกที่พระองค์รัก', desc: 'คะแนนเต็มในพระธรรมยอห์น', icon: <MessageSquare />, color: 'text-cyan-400', bg: 'bg-cyan-50' },
  { id: 'acts_max', title: 'พยานถึงสุดปลายโลก', desc: 'คะแนนเต็มในกิจการ', icon: <Map />, color: 'text-orange-500', bg: 'bg-orange-50' },
  { id: 'romans_max', title: 'นักศาสนศาสตร์', desc: 'คะแนนเต็มในพระธรรมโรม', icon: <ScrollText />, color: 'text-red-600', bg: 'bg-red-50' },
  { id: 'corinthians1_max', title: 'ผู้เชี่ยวชาญความรัก', desc: 'คะแนนเต็มใน 1 โครินธ์', icon: <Users />, color: 'text-fuchsia-500', bg: 'bg-fuchsia-50' },
  { id: 'corinthians2_max', title: 'ผู้เปี่ยมพระคุณ', desc: 'คะแนนเต็มใน 2 โครินธ์', icon: <Sun />, color: 'text-amber-400', bg: 'bg-amber-50' },
  { id: 'galatians_max', title: 'ไทในพระคริสต์', desc: 'คะแนนเต็มในกาลาเทีย', icon: <Check />, color: 'text-lime-600', bg: 'bg-lime-50' },
  { id: 'ephesians_max', title: 'อัศวินยุทธภัณฑ์', desc: 'คะแนนเต็มในเอเฟซัส', icon: <Shield />, color: 'text-teal-600', bg: 'bg-teal-50' },
  { id: 'philippians_max', title: 'ผู้เปี่ยมความยินดี', desc: 'คะแนนเต็มในฟิลิปปี', icon: <Heart />, color: 'text-pink-500', bg: 'bg-pink-50' },
  { id: 'colossians_max', title: 'ผู้บริบูรณ์ในพระคริสต์', desc: 'คะแนนเต็มในโคโลสี', icon: <Anchor />, color: 'text-blue-500', bg: 'bg-blue-50' },
  { id: 'thessalonians1_max', title: 'ผู้รอคอยอย่างสัตย์ซื่อ', desc: 'คะแนนเต็มใน 1 เธสะโลนิกา', icon: <Clock />, color: 'text-indigo-500', bg: 'bg-indigo-50' },
  { id: 'thessalonians2_max', title: 'ผู้ยืนหยัดมั่นคง', desc: 'คะแนนเต็มใน 2 เธสะโลนิกา', icon: <ShieldCheck />, color: 'text-purple-600', bg: 'bg-purple-50' },
  { id: 'timothy1_max', title: 'ผู้นำที่ไร้ที่ติ', desc: 'คะแนนเต็มใน 1 ทิโมธี', icon: <User />, color: 'text-slate-600', bg: 'bg-slate-50' },
  { id: 'timothy2_max', title: 'ทหารของพระคริสต์', desc: 'คะแนนเต็มใน 2 ทิโมธี', icon: <Target />, color: 'text-gray-600', bg: 'bg-gray-50' },
  { id: 'titus_max', title: 'ผู้ประพฤติดี', desc: 'คะแนนเต็มในทิตัส', icon: <CheckCircle />, color: 'text-stone-500', bg: 'bg-stone-50' },
  { id: 'philemon_max', title: 'ผู้คืนดี', desc: 'คะแนนเต็มในฟีเลโมน', icon: <Users />, color: 'text-neutral-500', bg: 'bg-neutral-50' },
  { id: 'hebrews_max', title: 'วีรบุรุษความเชื่อ', desc: 'คะแนนเต็มในฮีบรู', icon: <Shield />, color: 'text-amber-600', bg: 'bg-amber-50' },
  { id: 'james_max', title: 'ผู้ปฏิบัติพระวจนะ', desc: 'คะแนนเต็มในยากอบ', icon: <PenTool />, color: 'text-green-600', bg: 'bg-green-50' },
  { id: 'peter1_max', title: 'ผู้ทนทุกข์เพื่อความชอบธรรม', desc: 'คะแนนเต็มใน 1 เปโตร', icon: <Flame />, color: 'text-blue-400', bg: 'bg-blue-50' },
  { id: 'peter2_max', title: 'ผู้มีความรู้แท้', desc: 'คะแนนเต็มใน 2 เปโตร', icon: <Lightbulb />, color: 'text-indigo-600', bg: 'bg-indigo-50' },
  { id: 'john1_max', title: 'ผู้ดำเนินในความสว่าง', desc: 'คะแนนเต็มใน 1 ยอห์น', icon: <Sun />, color: 'text-yellow-500', bg: 'bg-yellow-50' },
  { id: 'john2_max', title: 'ผู้ดำเนินในความจริง', desc: 'คะแนนเต็มใน 2 ยอห์น', icon: <BookOpen />, color: 'text-orange-500', bg: 'bg-orange-50' },
  { id: 'john3_max', title: 'ผู้สนับสนุนพันธกิจ', desc: 'คะแนนเต็มใน 3 ยอห์น', icon: <Compass />, color: 'text-amber-500', bg: 'bg-amber-50' },
  { id: 'jude_max', title: 'ผู้พิทักษ์ความเชื่อ', desc: 'คะแนนเต็มในยูดา', icon: <ShieldCheck />, color: 'text-red-700', bg: 'bg-red-50' },
  { id: 'revelation_max', title: 'ผู้มีชัยชนะ', desc: 'คะแนนเต็มในวิวรณ์', icon: <Crown />, color: 'text-purple-700', bg: 'bg-purple-50' },
];

export default function App() {
  const [view, setView] = useState('home'); 
  const [currentBook, setCurrentBook] = useState(null);
  const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showRationale, setShowRationale] = useState(false);
  const [timeLeft, setTimeLeft] = useState(10);
  const [streak, setStreak] = useState(0);
  const [selectedLibraryBook, setSelectedLibraryBook] = useState(null);
  
  const [stats, setStats] = useState({
    totalPoints: 0,
    completedBooks: [],
    bestScores: {},
    unlockedAwards: []
  });

  const timerRef = useRef(null);

  useEffect(() => {
    const saved = localStorage.getItem('bible_quiz_v4');
    if (saved) setStats(JSON.parse(saved));
  }, []);

  useEffect(() => {
    if (view === 'quiz' && selectedAnswer === null) {
      if (timeLeft > 0) {
        timerRef.current = setTimeout(() => setTimeLeft(prev => prev - 0.1), 100);
      } else {
        handleAnswer(-1); 
      }
    }
    return () => clearTimeout(timerRef.current);
  }, [view, timeLeft, selectedAnswer]);

  const saveStats = (book, finalScore) => {
    const newStats = { ...stats };
    const prevBest = stats.bestScores[book] || 0;
    
    if (finalScore > prevBest) {
      newStats.bestScores[book] = finalScore;
      newStats.totalPoints = stats.totalPoints + (finalScore - prevBest);
    }
    
    if (!newStats.completedBooks.includes(book)) {
      newStats.completedBooks.push(book);
    }

    const newAwards = [...newStats.unlockedAwards];
    const bestScores = newStats.bestScores;
    const completed = newStats.completedBooks;

    const check = (id, condition) => {
        if (condition && !newAwards.includes(id)) newAwards.push(id);
    };

    // General Checks
    check('starter', completed.length >= 1);
    check('scholar', finalScore === 10);
    check('warrior', newStats.totalPoints >= 50);
    check('seeker', completed.length >= 5);
    check('centurion', newStats.totalPoints >= 100);
    check('high_priest', newStats.totalPoints >= 150);
    check('master', Object.keys(quizData).length === completed.length);
    
    // Dynamic Specific Book Checks
    Object.keys(quizData).forEach(bookKey => {
      const awardId = `${bookKey}_max`;
      check(awardId, bestScores[bookKey] === 10);
    });
    
    newStats.unlockedAwards = newAwards;
    setStats(newStats);
    localStorage.setItem('bible_quiz_v4', JSON.stringify(newStats));
  };

  const startQuiz = (bookKey) => {
    setCurrentBook(bookKey);
    setCurrentQuestionIndex(0);
    setScore(0);
    setStreak(0);
    setSelectedAnswer(null);
    setShowRationale(false);
    setTimeLeft(10);
    setView('quiz');
  };

  const handleAnswer = (idx) => {
    if (selectedAnswer !== null) return;
    clearTimeout(timerRef.current);
    
    setSelectedAnswer(idx);
    const correct = quizData[currentBook].questions[currentQuestionIndex].c;
    
    if (idx === correct) {
      setScore(s => s + 1);
      const newStreak = streak + 1;
      setStreak(newStreak);
      if (newStreak >= 3 && !stats.unlockedAwards.includes('fast')) {
          setStats(prev => ({...prev, unlockedAwards: [...prev.unlockedAwards, 'fast']}));
      }
    } else {
      setStreak(0);
    }
    setShowRationale(true);
  };

  const nextQuestion = () => {
    const questions = quizData[currentBook].questions;
    if (currentQuestionIndex < questions.length - 1) {
      setCurrentQuestionIndex(i => i + 1);
      setSelectedAnswer(null);
      setShowRationale(false);
      setTimeLeft(10);
    } else {
      saveStats(currentBook, score);
      setView('result');
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 text-[#1E293B] font-sans pb-28">
      <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-slate-100 px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          {view !== 'home' && (
            <button 
              onClick={() => { setView('home'); setSelectedLibraryBook(null); }} 
              className="p-2 hover:bg-slate-100 rounded-xl transition-all hover:scale-110 active:scale-95"
            >
              <ChevronLeft size={20} />
            </button>
          )}
          <h1 className="font-black text-xl tracking-tight text-slate-900">
            {APP_TITLE}
          </h1>
        </div>
        <div className="flex items-center gap-2 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-100">
          <Flame size={14} className="text-amber-500 fill-amber-500" />
          <span className="text-sm font-black text-amber-700">{stats.totalPoints}</span>
        </div>
      </header>

      <main className="max-w-xl mx-auto p-4 sm:p-6 overflow-hidden">
        {view === 'home' && (
          <div className="space-y-6">
            <section className="bg-gradient-to-br from-indigo-600 to-violet-700 rounded-[2rem] p-8 text-white shadow-xl shadow-indigo-200 relative overflow-hidden">
              <div className="relative z-10">
                <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 inline-block">
                  Disciple Maker Mode
                </span>
                <h2 className="text-3xl sm:text-4xl font-black mb-2 leading-tight">เกมตอบคำถาม</h2>
                <p className="text-indigo-100 text-sm font-medium opacity-90 italic">"พระวจนะของพระองค์เป็นตะเกียงแก่เท้าของข้าพระองค์ และเป็นความสว่างแก่ทางของข้าพระองค์ สดุดี 119:105"</p>
              </div>
              <div className="absolute -right-8 -bottom-8 opacity-10 rotate-12">
                <BookMarked size={160} />
              </div>
            </section>

            <div className="space-y-4">
              <div className="flex items-center justify-between px-2">
                <h3 className="font-black text-slate-400 text-xs uppercase tracking-widest">หมวดพระคัมภีร์ใหม่</h3>
                <span className="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-lg">
                  {stats.completedBooks.length} / {Object.keys(quizData).length} จบแล้ว
                </span>
              </div>
              <div className="grid grid-cols-1 gap-3">
                {Object.keys(quizData).map((key) => {
                  const book = quizData[key];
                  const best = stats.bestScores[key];
                  return (
                    <button
                      key={key}
                      onClick={() => startQuiz(key)}
                      className="group bg-white border border-slate-200 p-4 rounded-[1.5rem] flex items-center gap-4 hover:border-indigo-300 hover:shadow-lg transition-all duration-300 active:scale-[0.98] hover:-translate-y-1"
                    >
                      <div className={`w-12 h-12 bg-gradient-to-br ${book.color} rounded-2xl flex items-center justify-center text-white shrink-0 transition-transform duration-300 group-hover:rotate-6 group-hover:scale-110 shadow-sm`}>
                        <BookMarked size={22} />
                      </div>
                      <div className="flex-1 text-left overflow-hidden">
                        <div className="font-black text-slate-800 truncate transition-colors group-hover:text-indigo-700">{book.title}</div>
                        <div className="text-[10px] text-slate-400 font-bold uppercase">10 คำถาม • มีเวลาจำกัด</div>
                      </div>
                      {best !== undefined && (
                        <div className="text-right">
                          <div className={`font-black text-lg ${best === 10 ? 'text-emerald-500' : 'text-indigo-600'}`}>{best}/10</div>
                          <div className="text-[8px] text-slate-400 font-black">คะแนนสูงสุด</div>
                        </div>
                      )}
                      <div className="p-2 bg-slate-50 rounded-xl text-slate-300 transition-colors duration-300 group-hover:bg-indigo-50 group-hover:text-indigo-500">
                        <ArrowRight size={14} className="transition-transform duration-300 group-hover:translate-x-1" />
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {view === 'quiz' && (
          <div>
            <div className="relative w-full h-2 bg-slate-200 rounded-full mb-8 overflow-hidden shadow-inner">
                <div 
                  className={`absolute left-0 top-0 h-full transition-all duration-100 ease-linear ${timeLeft < 3 ? 'bg-red-500' : 'bg-indigo-500'}`}
                  style={{ width: `${(timeLeft / 10) * 100}%` }}
                />
            </div>

            <div className="bg-white rounded-[2rem] p-6 sm:p-8 shadow-xl border border-slate-100 mb-6 relative">
              <div className="flex justify-between items-center mb-8">
                <div className="bg-slate-900 text-white px-4 py-1 rounded-xl text-sm font-black">
                  คำถามที่ {currentQuestionIndex + 1} / 10
                </div>
                <div className={`flex items-center gap-2 font-black text-sm ${timeLeft < 3 ? 'text-red-500' : 'text-slate-400'}`}>
                  <Clock size={16} />
                  {timeLeft.toFixed(1)} วินาที
                </div>
              </div>
              
              <h2 className="text-xl sm:text-2xl font-black text-slate-900 leading-snug mb-8">
                {quizData[currentBook].questions[currentQuestionIndex].q}
              </h2>
              
              <div className="space-y-3">
                {quizData[currentBook].questions[currentQuestionIndex].a.map((option, idx) => {
                  const isCorrect = idx === quizData[currentBook].questions[currentQuestionIndex].c;
                  const isSelected = selectedAnswer === idx;
                  
                  let btnStyle = "border-slate-100 bg-slate-50 text-slate-700 hover:border-indigo-200 hover:bg-white hover:shadow-md";
                  if (selectedAnswer !== null) {
                    if (isCorrect) btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-900 ring-4 ring-emerald-100 scale-[1.02] z-10 shadow-lg";
                    else if (isSelected) btnStyle = "border-red-500 bg-red-50 text-red-900 scale-95 opacity-80";
                    else btnStyle = "border-slate-50 opacity-40 grayscale";
                  }

                  return (
                    <button
                      key={idx}
                      disabled={selectedAnswer !== null}
                      onClick={() => handleAnswer(idx)}
                      className={`w-full text-left p-5 rounded-2xl border-2 font-bold transition-all duration-300 flex items-center justify-between group ${btnStyle}`}
                    >
                      <span className="flex-1 pr-4">{option}</span>
                      {selectedAnswer !== null && isCorrect && <CheckCircle size={20} className="text-emerald-500 shrink-0" />}
                      {selectedAnswer !== null && isSelected && !isCorrect && <XCircle size={20} className="text-red-500 shrink-0" />}
                    </button>
                  );
                })}
              </div>
            </div>

            {showRationale && (
              <div className="space-y-6">
                <div className="bg-white border border-slate-100 rounded-3xl p-6 flex gap-4 shadow-md">
                  <div className="bg-indigo-100 w-10 h-10 rounded-xl flex items-center justify-center shrink-0 text-indigo-600">
                    <Info size={20} />
                  </div>
                  <div>
                    <h4 className="text-slate-400 font-black text-[10px] mb-1 uppercase tracking-widest">อธิบายเพิ่มเติม</h4>
                    <p className="text-slate-700 text-sm leading-relaxed font-semibold">
                      {quizData[currentBook].questions[currentQuestionIndex].r}
                    </p>
                  </div>
                </div>
                <button
                  onClick={nextQuestion}
                  className={`w-full py-5 bg-gradient-to-r ${quizData[currentBook].color} text-white rounded-2xl font-black shadow-lg shadow-indigo-200 flex items-center justify-center gap-3 active:scale-95 transition-all hover:opacity-90`}
                >
                  {currentQuestionIndex < 9 ? "ข้อต่อไป" : "ดูผลลัพธ์"}
                  <ArrowRight size={20} />
                </button>
              </div>
            )}
          </div>
        )}

        {view === 'awards' && (
          <div className="space-y-6">
             <div className="text-center py-4">
                <h2 className="text-3xl font-black text-slate-900 mb-2">เกียรติยศ</h2>
                <p className="text-slate-400 font-bold">ความสำเร็จของท่านในการเรียนรู้พระคำ</p>
             </div>
             <div className="grid grid-cols-2 gap-4 pb-10">
                {awards.map(award => {
                  const isLocked = !stats.unlockedAwards.includes(award.id);
                  return (
                    <div 
                      key={award.id} 
                      className={`p-6 rounded-[2rem] border-2 text-center flex flex-col items-center ${isLocked ? 'border-slate-100 bg-slate-50 grayscale opacity-50' : `border-white shadow-xl ${award.bg}`}`}
                    >
                       <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-4 ${isLocked ? 'text-slate-300' : `${award.color} shadow-md`} bg-white`}>
                          {React.cloneElement(award.icon, { size: 32 })}
                       </div>
                       <h4 className={`font-black text-xs mb-1 ${isLocked ? 'text-slate-400' : 'text-slate-900'}`}>{award.title}</h4>
                       <p className="text-[10px] font-bold text-slate-500 leading-tight min-h-[2.5rem]">{award.desc}</p>
                       {!isLocked && <div className="mt-3 bg-white/60 px-3 py-1 rounded-full text-[9px] font-black text-indigo-700 uppercase border border-indigo-100">ได้รับแล้ว</div>}
                    </div>
                  );
                })}
             </div>
          </div>
        )}

        {view === 'library' && (
          <div className="space-y-6">
            {!selectedLibraryBook ? (
              <>
                <div className="text-center py-4">
                    <h2 className="text-3xl font-black text-slate-900 mb-2">คลังอรรถาธิบาย</h2>
                    <p className="text-slate-400 font-bold">เจาะลึกเบื้องหลังพระคัมภีร์แต่ละเล่ม</p>
                </div>
                <div className="space-y-4 pb-10">
                  {Object.keys(quizData).map((key) => {
                    const book = quizData[key];
                    return (
                      <button 
                        key={key} 
                        onClick={() => setSelectedLibraryBook(key)}
                        className="w-full text-left bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm hover:shadow-lg hover:border-indigo-200 transition-all duration-300 flex gap-5 items-start group hover:-translate-y-1"
                      >
                         <div className={`w-12 h-12 rounded-2xl bg-gradient-to-br ${book.color} flex items-center justify-center text-white shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3 shadow-sm`}>
                            <ScrollText size={22} />
                         </div>
                         <div className="flex-1">
                            <h4 className="font-black text-lg text-slate-900 mb-1 transition-colors group-hover:text-indigo-600">{book.title}</h4>
                            <p className="text-slate-500 text-xs leading-relaxed font-medium line-clamp-2">
                              {book.summary}
                            </p>
                         </div>
                         <div className="self-center p-2 rounded-full bg-slate-50 text-slate-300 transition-colors group-hover:bg-indigo-50 group-hover:text-indigo-500">
                           <ChevronLeft size={18} className="rotate-180 transition-transform group-hover:translate-x-1" />
                         </div>
                      </button>
                    );
                  })}
                </div>
              </>
            ) : (
              <div className="pb-10">
                <button 
                  onClick={() => setSelectedLibraryBook(null)}
                  className="mb-6 flex items-center gap-2 text-indigo-600 font-black text-sm hover:gap-3 transition-all"
                >
                  <ChevronLeft size={18} /> กลับไปหน้าคลัง
                </button>

                <div className={`rounded-[2.5rem] bg-gradient-to-br ${quizData[selectedLibraryBook].color} p-8 text-white mb-8 shadow-xl`}>
                  <div className="flex items-center gap-4 mb-4">
                     <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-sm">
                        <BookOpen size={30} />
                     </div>
                     <div>
                        <h2 className="text-2xl font-black">{quizData[selectedLibraryBook].title}</h2>
                        <p className="text-white/80 text-xs font-bold uppercase tracking-wider">Bible Exposition</p>
                     </div>
                  </div>
                  <p className="text-lg font-medium italic opacity-90">{quizData[selectedLibraryBook].summary}</p>
                </div>

                <div className="space-y-4">
                  <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <div className="flex items-center gap-3 mb-3 text-indigo-600">
                      <User size={18} />
                      <h3 className="font-black text-sm uppercase tracking-wider">ผู้เขียนและกลุ่มเป้าหมาย</h3>
                    </div>
                    <p className="text-slate-700 font-semibold mb-2">{quizData[selectedLibraryBook].exposition.author}</p>
                    <p className="text-slate-500 text-sm font-medium">เขียนถึง: {quizData[selectedLibraryBook].exposition.audience}</p>
                  </div>

                  <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <div className="flex items-center gap-3 mb-3 text-emerald-600">
                      <Target size={18} />
                      <h3 className="font-black text-sm uppercase tracking-wider">วัตถุประสงค์</h3>
                    </div>
                    <p className="text-slate-700 font-medium leading-relaxed">{quizData[selectedLibraryBook].exposition.purpose}</p>
                  </div>

                  <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <div className="flex items-center gap-3 mb-3 text-amber-600">
                      <Lightbulb size={18} />
                      <h3 className="font-black text-sm uppercase tracking-wider">หัวใจสำคัญ</h3>
                    </div>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {quizData[selectedLibraryBook].exposition.key_themes.split(', ').map((theme, i) => (
                        <span key={theme} className="px-3 py-1 bg-amber-50 text-amber-700 rounded-full text-xs font-black border border-amber-100">
                          {theme}
                        </span>
                      ))}
                    </div>
                    <p className="text-slate-600 text-sm font-medium leading-loose">
                      {quizData[selectedLibraryBook].exposition.description}
                    </p>
                  </div>
                </div>

                <button 
                  onClick={() => startQuiz(selectedLibraryBook)}
                  className="w-full mt-8 py-5 bg-slate-900 text-white rounded-3xl font-black flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all hover:bg-indigo-600 group"
                >
                  เริ่มแบบทดสอบเล่มนี้
                  <Zap size={20} className="fill-amber-400 text-amber-400 group-hover:scale-110 transition-transform" />
                </button>
              </div>
            )}
          </div>
        )}

        {view === 'result' && (
          <div className="text-center py-6">
            <div className="bg-white rounded-[3rem] p-10 shadow-2xl shadow-indigo-100 border border-slate-50">
              <div className="w-24 h-24 bg-indigo-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner">
                <Trophy size={50} className="text-indigo-500" />
              </div>
              <h2 className="text-3xl font-black text-slate-900 mb-2">บทเรียนสำเร็จ!</h2>
              <p className="text-slate-400 font-bold mb-8">ขอบคุณพระเจ้าสำหรับการเติบโตในพระคำ</p>
              
              <div className="bg-slate-50 rounded-[2rem] p-8 mb-8 border border-slate-100">
                <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">ผลการทดสอบ</div>
                <div className="text-8xl font-black text-slate-900 leading-none">
                  {score}<span className="text-3xl text-slate-300 ml-1">/10</span>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <button
                  onClick={() => setView('home')}
                  className="py-4 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-slate-800 hover:scale-105 active:scale-95 transition-all"
                >
                  <Home size={18} /> กลับหน้าหลัก
                </button>
                <button
                  onClick={() => startQuiz(currentBook)}
                  className="py-4 bg-white border-2 border-slate-100 text-slate-900 rounded-2xl font-black flex items-center justify-center gap-2 hover:border-indigo-100 hover:scale-105 active:scale-95 transition-all"
                >
                  <RefreshCw size={18} /> ลองใหม่อีกครั้ง
                </button>
              </div>
            </div>
          </div>
        )}
      </main>

      <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md border border-slate-200 px-6 sm:px-10 py-3 rounded-full shadow-2xl flex items-center gap-12 sm:gap-16 z-50">
        <button 
          onClick={() => { setView('home'); setSelectedLibraryBook(null); }}
          className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view === 'home' || view === 'quiz' || view === 'result' ? 'text-indigo-600 scale-110 -translate-y-1' : 'text-slate-300 hover:text-slate-400 hover:-translate-y-1'}`}
        >
          <Layout size={22} strokeWidth={view === 'home' ? 3 : 2} />
          <span className="text-[10px] font-black uppercase tracking-tighter">หน้าแรก</span>
        </button>
        <button 
          onClick={() => { setView('awards'); setSelectedLibraryBook(null); }}
          className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view === 'awards' ? 'text-indigo-600 scale-110 -translate-y-1' : 'text-slate-300 hover:text-slate-400 hover:-translate-y-1'}`}
        >
          <Award size={22} strokeWidth={view === 'awards' ? 3 : 2} />
          <span className="text-[10px] font-black uppercase tracking-tighter">รางวัล</span>
        </button>
        <button 
          onClick={() => { setView('library'); setSelectedLibraryBook(null); }}
          className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view === 'library' ? 'text-indigo-600 scale-110 -translate-y-1' : 'text-slate-300 hover:text-slate-400 hover:-translate-y-1'}`}
        >
          <BookOpen size={22} strokeWidth={view === 'library' ? 3 : 2} />
          <span className="text-[10px] font-black uppercase tracking-tighter">คลัง</span>
        </button>
      </nav>
    </div>
  );
}